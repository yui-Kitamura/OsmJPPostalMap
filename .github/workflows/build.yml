name: Build APK

on:
  push:
    branches: [ "**" ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5.5.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build Release APK
        run: gradle assembleRelease
        env:
          GIT_COMMIT_HASH: ${{ github.sha }}
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          OSM_CLIENT_ID: ${{ secrets.OSM_CLIENT_ID }}
          OSM_CLIENT_SECRET: ${{ secrets.OSM_CLIENT_SECRET }}

      - name: Build App Bundle
        if: github.event_name == 'release'
        run: gradle bundleRelease
        env:
          GIT_COMMIT_HASH: ${{ github.sha }}
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          OSM_CLIENT_ID: ${{ secrets.OSM_CLIENT_ID }}
          OSM_CLIENT_SECRET: ${{ secrets.OSM_CLIENT_SECRET }}

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          archive: 'false'

      - name: Upload AAB to Artifacts
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-release-bundle
          path: app/build/outputs/bundle/release/*.aab
          archive: 'false'

      - name: GH Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab